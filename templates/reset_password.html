<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รีเซ็ตรหัสผ่าน — OrgChat AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Sarabun:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Outfit', 'Sarabun', sans-serif; }
        .input-field { width:100%; padding:.625rem .875rem; border:1.5px solid #e2e8f0; border-radius:.75rem; font-size:.9rem; outline:none; transition:border-color .15s; background:#fff; }
        .input-field:focus { border-color:#059669; box-shadow:0 0 0 3px rgba(5,150,105,.08); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
<nav class="bg-white border-b border-slate-200 px-6 py-4">
    <div class="max-w-6xl mx-auto">
        <a href="/" class="flex items-center gap-2 w-fit">
            <div class="w-8 h-8 bg-emerald-600 rounded-xl flex items-center justify-center">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <span class="font-bold text-slate-900">OrgChat AI</span>
        </a>
    </div>
</nav>

<main class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        {% if valid %}
        <div class="bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
            <h1 class="text-2xl font-bold text-slate-900 mb-1">ตั้งรหัสผ่านใหม่</h1>
            <p class="text-sm text-slate-500 mb-7">สำหรับบัญชี <strong>{{ username }}</strong></p>

            <div id="error-box" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600"></div>

            <form id="reset-form" onsubmit="handleReset(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1.5">รหัสผ่านใหม่</label>
                        <input type="password" id="password" class="input-field" placeholder="อย่างน้อย 6 ตัวอักษร" required minlength="6">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1.5">ยืนยันรหัสผ่านใหม่</label>
                        <input type="password" id="confirm" class="input-field" placeholder="พิมพ์อีกครั้ง" required>
                    </div>
                </div>
                <button type="submit" id="submit-btn"
                    class="mt-6 w-full py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl transition text-sm">
                    บันทึกรหัสผ่านใหม่
                </button>
                <input type="hidden" id="token" value="{{ token }}">
            </form>
        </div>
        {% else %}
        <div class="bg-white border border-slate-200 rounded-2xl p-8 shadow-sm text-center">
            <div class="w-12 h-12 bg-red-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <h2 class="text-xl font-bold text-slate-900 mb-2">ลิ้งค์ไม่ถูกต้องหรือหมดอายุ</h2>
            <p class="text-sm text-slate-500 mb-6">ลิ้งค์รีเซ็ตรหัสผ่านใช้ได้ 1 ชั่วโมงเท่านั้น</p>
            <a href="/forgot-password" class="inline-block px-6 py-2.5 bg-emerald-600 text-white font-bold rounded-xl text-sm hover:bg-emerald-700 transition">
                ขอลิ้งค์ใหม่
            </a>
        </div>
        {% endif %}
    </div>
</main>

<script>
async function handleReset(e) {
    e.preventDefault();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    const token    = document.getElementById('token').value;
    const errBox   = document.getElementById('error-box');
    const btn      = document.getElementById('submit-btn');

    errBox.classList.add('hidden');
    if (password !== confirm) {
        errBox.textContent = 'รหัสผ่านไม่ตรงกัน';
        errBox.classList.remove('hidden');
        return;
    }
    btn.disabled = true;
    btn.textContent = 'กำลังบันทึก...';

    try {
        const res = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({token, password})
        });
        const data = await res.json();
        if (data.ok) {
            document.getElementById('reset-form').innerHTML = `
                <div class="p-4 bg-emerald-50 border border-emerald-200 rounded-xl text-emerald-800 text-sm text-center">
                    <p class="font-bold mb-1">รีเซ็ตรหัสผ่านสำเร็จ!</p>
                    <a href="/" class="text-emerald-600 hover:underline font-semibold">เข้าสู่ระบบ</a>
                </div>`;
        } else {
            errBox.textContent = data.error || 'เกิดข้อผิดพลาด';
            errBox.classList.remove('hidden');
            btn.disabled = false;
            btn.textContent = 'บันทึกรหัสผ่านใหม่';
        }
    } catch(err) {
        errBox.textContent = 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้';
        errBox.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'บันทึกรหัสผ่านใหม่';
    }
}
</script>
</body>
</html>
