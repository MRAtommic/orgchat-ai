<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลืมรหัสผ่าน — OrgChat AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Sarabun:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Outfit', 'Sarabun', sans-serif; }
        .input-field { width:100%; padding:.625rem .875rem; border:1.5px solid #e2e8f0; border-radius:.75rem; font-size:.9rem; outline:none; transition:border-color .15s; background:#fff; }
        .input-field:focus { border-color:#059669; box-shadow:0 0 0 3px rgba(5,150,105,.08); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
<nav class="bg-white border-b border-slate-200 px-6 py-4">
    <div class="max-w-6xl mx-auto">
        <a href="/" class="flex items-center gap-2 w-fit">
            <div class="w-8 h-8 bg-emerald-600 rounded-xl flex items-center justify-center">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <span class="font-bold text-slate-900">OrgChat AI</span>
        </a>
    </div>
</nav>

<main class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
            <div class="w-12 h-12 bg-emerald-50 rounded-2xl flex items-center justify-center mx-auto mb-5">
                <svg class="w-6 h-6 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-900 text-center mb-1">ลืมรหัสผ่าน</h1>
            <p class="text-sm text-slate-500 text-center mb-7">กรอก username แล้วระบบจะส่งลิ้งค์รีเซ็ตไปทาง LINE ของคุณ</p>

            <div id="result-box" class="hidden mb-4 p-4 rounded-xl text-sm"></div>

            <form id="forgot-form" onsubmit="handleSubmit(event)">
                <label class="block text-xs font-semibold text-slate-600 mb-1.5">Username</label>
                <input type="text" id="username" class="input-field" placeholder="เช่น somchai" autocomplete="username" required>
                <button type="submit" id="submit-btn"
                    class="mt-4 w-full py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl transition text-sm">
                    ส่งลิ้งค์รีเซ็ตรหัสผ่าน
                </button>
            </form>

            <p class="text-center text-sm text-slate-400 mt-5">
                <a href="/" class="text-emerald-600 hover:underline">กลับหน้าเข้าสู่ระบบ</a>
            </p>
        </div>
        <p class="text-xs text-slate-400 text-center mt-4">
            ถ้าเชื่อม LINE แล้ว จะส่งลิ้งค์ทาง LINE / ถ้ายังไม่เชื่อม จะแสดงลิ้งค์โดยตรงค่ะ
        </p>
    </div>
</main>

<script>
async function handleSubmit(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const box = document.getElementById('result-box');
    const username = document.getElementById('username').value.trim();
    btn.disabled = true;
    btn.textContent = 'กำลังส่ง...';
    box.className = 'hidden mb-4 p-4 rounded-xl text-sm';

    try {
        const res = await fetch('/api/auth/forgot-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username})
        });
        const data = await res.json();
        box.classList.remove('hidden');
        if (data.ok) {
            box.className = 'mb-4 p-4 rounded-xl text-sm bg-emerald-50 border border-emerald-200 text-emerald-800';
            if (data.reset_url) {
                box.textContent = '';
                const msg = document.createElement('span');
                msg.textContent = data.message;
                const br1 = document.createElement('br');
                const br2 = document.createElement('br');
                const link = document.createElement('a');
                link.href = data.reset_url;
                link.textContent = 'คลิกที่นี่เพื่อตั้งรหัสผ่านใหม่ →';
                link.className = 'inline-block mt-2 px-4 py-2 bg-emerald-600 text-white font-bold rounded-xl text-sm hover:bg-emerald-700';
                box.append(msg, br1, br2, link);
            } else {
                box.textContent = data.message;
            }
            document.getElementById('forgot-form').classList.add('hidden');
        } else {
            box.className = 'mb-4 p-4 rounded-xl text-sm bg-red-50 border border-red-200 text-red-700';
            box.textContent = data.error || 'เกิดข้อผิดพลาด';
            btn.disabled = false;
            btn.textContent = 'ส่งลิ้งค์รีเซ็ตรหัสผ่าน';
        }
    } catch(err) {
        box.classList.remove('hidden');
        box.className = 'mb-4 p-4 rounded-xl text-sm bg-red-50 border border-red-200 text-red-700';
        box.textContent = 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้';
        btn.disabled = false;
        btn.textContent = 'ส่งลิ้งค์รีเซ็ตรหัสผ่าน';
    }
}
</script>
</body>
</html>
