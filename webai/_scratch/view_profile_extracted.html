<section id="view-profile"
          class="view hidden flex-1 flex flex-col items-center overflow-hidden animate-in fade-in duration-300">
          <header
            class="h-14 border-b border-surface-100 dark:border-surface-800 flex items-center justify-between px-6 bg-white dark:bg-surface-900 sticky top-0 z-10 w-full">
            <h2 class="font-semibold text-sm">การตั้งค่าโปรไฟล์ส่วนตัว</h2>
          </header>
          <div class="flex-1 min-h-0 overflow-y-auto w-full max-w-2xl p-4 md:p-8 space-y-8">
            <div
              class="bg-white dark:bg-surface-900 border border-surface-200 dark:border-surface-800 rounded-3xl overflow-hidden shadow-sm">
              <!-- Profile Header/Cover Preview -->
              <div id="profileCoverPreview" class="h-32 bg-brand-600 relative">
                <div class="absolute -bottom-10 left-8">
                  <div class="relative group">
                    <div id="profileAvatarPreview"
                      class="w-24 h-24 rounded-2xl bg-white dark:bg-surface-800 p-1 shadow-xl overflow-hidden border-4 border-white dark:border-surface-900">
                      <div
                        class="w-full h-full bg-surface-100 dark:bg-surface-700 flex items-center justify-center text-surface-400">
                        <i data-lucide="user" class="w-10 h-10"></i>
                      </div>
                    </div>
                    <button onclick="document.getElementById('avatarUploadInput').click()"
                      class="absolute inset-0 bg-black/40 text-white opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center rounded-2xl">
                      <i data-lucide="camera" class="w-6 h-6"></i>
                    </button>
                    <input type="file" id="avatarUploadInput" class="hidden" accept="image/*">
                  </div>
                </div>
              </div>

              <div class="pt-14 p-8 space-y-8">
                <!-- Account Information Section -->
                <div class="space-y-4">
                  <div class="flex items-center gap-2 pb-2 border-b border-surface-100 dark:border-surface-800">
                    <i data-lucide="user-cog" class="w-4 h-4 text-brand-600"></i>
                    <h3 class="text-xs font-black uppercase tracking-widest text-surface-500">ข้อมูลบัญชีผู้ใช้</h3>
                  </div>
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                      <label
                        class="text-[10px] font-bold text-surface-400 uppercase tracking-widest">ชื่อที่แสดง</label>
                      <input type="text" id="profileNameInput" class="input-field w-full"
                        placeholder="ระบุชื่อที่คุณต้องการให้คนอื่นเห็น">
                    </div>
                    <div class="space-y-2">
                      <label class="text-[10px] font-bold text-surface-400 uppercase tracking-widest">Username
                        (แก้ไขไม่ได้)</label>
                      <input type="text" id="profileUsernameDisplay"
                        class="input-field w-full opacity-50 cursor-not-allowed" readonly>
                    </div>
                  </div>
                </div>

                <!-- Appearance Section -->
                <div class="space-y-4 pt-4">
                  <div class="flex items-center gap-2 pb-2 border-b border-surface-100 dark:border-surface-800">
                    <i data-lucide="palette" class="w-4 h-4 text-brand-600"></i>
                    <h3 class="text-xs font-black uppercase tracking-widest text-surface-500">การปรับแต่งแอปพลิเคชัน
                    </h3>
                  </div>

                  <!-- Theme Toggle (Dark/Light) -->
                  <div class="space-y-3">
                    <label class="text-[10px] font-bold text-surface-400 uppercase tracking-widest">โหมดการแสดงผล</label>
                    <button id="profileThemeToggle"
                      class="flex items-center gap-3 px-4 py-3 w-full bg-surface-50 dark:bg-surface-800 rounded-2xl border border-surface-100 dark:border-surface-700 hover:border-brand-500 transition-all group">
                      <div
                        class="w-10 h-10 rounded-xl bg-white dark:bg-surface-900 flex items-center justify-center shadow-sm group-hover:scale-110 transition-transform">
                        <i data-lucide="moon" class="themeIcon w-5 h-5 text-brand-600"></i>
                      </div>
                      <div class="flex-1 text-left">
                        <div class="text-sm font-bold themeText">โหมดกลางคืน</div>
                        <div class="text-[10px] text-surface-500">เปลี่ยนระหว่างโหมดสว่างและมืด</div>
                      </div>
                      <i data-lucide="chevron-right" class="w-4 h-4 text-surface-300"></i>
                    </button>
                  </div>

                  <div class="space-y-3">
                    <label class="text-[10px] font-bold text-surface-400 uppercase tracking-widest">ธีมพื้นหลัง</label>
                    <div class="grid grid-cols-4 md:grid-cols-6 gap-3">
                      <button
                        class="bg-preset-btn w-full aspect-square rounded-xl border-2 border-transparent transition-all overflow-hidden bg-brand-600"
                        data-bg="linear-gradient(135deg, #2563eb, #1d4ed8)"></button>
                      <button
                        class="bg-preset-btn w-full aspect-square rounded-xl border-2 border-transparent transition-all overflow-hidden bg-slate-900"
                        data-bg="#0f172a"></button>
                      <button
                        class="bg-preset-btn w-full aspect-square rounded-xl border-2 border-transparent transition-all overflow-hidden bg-rose-600"
                        data-bg="linear-gradient(135deg, #e11d48, #be123c)"></button>
                      <button
                        class="bg-preset-btn w-full aspect-square rounded-xl border-2 border-transparent transition-all overflow-hidden bg-emerald-600"
                        data-bg="linear-gradient(135deg, #059669, #047857)"></button>
                      <button
                        class="bg-preset-btn w-full aspect-square rounded-xl border-2 border-transparent transition-all overflow-hidden bg-amber-600"
                        data-bg="linear-gradient(135deg, #d97706, #b45309)"></button>
                      <button
                        class="bg-preset-btn w-full aspect-square rounded-xl border-2 border-transparent transition-all overflow-hidden border-surface-200 dark:border-surface-700 flex items-center justify-center bg-surface-50 dark:bg-surface-800"
                        data-bg="custom" title="กำหนดสีเอง">
                        <i data-lucide="plus" class="w-4 h-4 text-surface-400"></i>
                      </button>
                    </div>
                  </div>

                  <div class="space-y-3">
                    <label class="text-[10px] font-bold text-surface-400 uppercase tracking-widest">สีเน้น (Accent
                      Color)</label>
                    <div class="flex flex-wrap gap-4 items-center">
                      <div class="flex gap-2">
                        <button
                          class="accent-color-btn w-6 h-6 rounded-full ring-2 ring-offset-2 ring-brand-600 ring-offset-white dark:ring-offset-surface-900"
                          data-color="#2563eb" style="background-color: #2563eb;"></button>
                        <button class="accent-color-btn w-6 h-6 rounded-full" data-color="#7c3aed"
                          style="background-color: #7c3aed;"></button>
                        <button class="accent-color-btn w-6 h-6 rounded-full" data-color="#db2777"
                          style="background-color: #db2777;"></button>
                        <button class="accent-color-btn w-6 h-6 rounded-full" data-color="#ea580c"
                          style="background-color: #ea580c;"></button>
                        <button class="accent-color-btn w-6 h-6 rounded-full" data-color="#16a34a"
                          style="background-color: #16a34a;"></button>
                      </div>
                      <div
                        class="flex items-center gap-2 px-3 py-1.5 bg-surface-50 dark:bg-surface-800 rounded-lg border border-surface-100 dark:border-surface-700">
                        <input type="color" id="customAccentInput"
                          class="w-5 h-5 bg-transparent border-0 cursor-pointer">
                        <span class="text-[10px] font-bold text-surface-400 uppercase">Custom</span>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="pt-6 border-t border-surface-100 dark:border-surface-800 flex justify-end">
                  <button id="saveProfileBtn" class="btn-primary min-w-[160px]">
                    <i data-lucide="save" class="w-4 h-4"></i> บันทึกข้อมูลทั้งหมด
                  </button>
                </div>
              </div>
            </div>
          </div>
        </section>
